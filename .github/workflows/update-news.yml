name: Update news data

on:
  push:
    branches: [main]
    paths:
      - sources.json
      - fetch-news.mjs
      - .github/workflows/update-news.yml
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node fetch-news.mjs
      - name: Commit fresh data
        run: |
          if git diff --quiet -- data/news.json; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/news.json
          git commit -m "data: refresh news feed"
          git push
